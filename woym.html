<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>(˵ ͡° ͜ʖ ͡°˵)</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" type="text/css" href="style.css">
  
  <style>

    #canvasContainer { margin-top: 1rem; }
    canvas { 
      border: 1px solid #000; 
      background: #fff; 
      display: block; 
      cursor: crosshair; 
      user-select: none;
      touch-action: none; 
    }

    .controls-container {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    #downloadBtn, #eraserBtn, #colorPicker {
      font-family: "Times New Roman", Times, serif;
      font-size: 11pt;
      letter-spacing: -0.3px;
      background: none;
      border: none;
      color: black;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      appearance: none; 
      -webkit-appearance: none;
      text-decoration: none; 
      line-height: 1.5; 
    }

    #colorPicker option { 
       font-family: "Times New Roman", Times, serif;
       font-size: 11pt;
    } 

    #gallery { margin-top:1rem; display:grid; grid-template-columns:repeat(auto-fill,150px); gap:10px; }
    #gallery img { max-width:150px; border:1px solid #ccc; }
    .text { margin-bottom: 1rem; }
  </style>

</head>
<body>
  <div id="content">
    <div class="container">
      <div class="text">
        <a href='index' id="home-link">*</a><br>
        what's on your mind?
      </div>
    </div>
  </div>

  <div id="canvasContainer">
    <canvas id="drawCanvas" width="500" height="500"></canvas>

    <div class="controls-container"> 
      <button id="eraserBtn">Tamaño Borrador</button>
      <input id="eraserSize" type="range" min="1" max="60" value="4" />
      <select id="colorPicker">
        <option value="#0000ff" style="color: #0000ff;">blue</option>
        <option value="#ff0000" style="color: #ff0000;">red</option>
        <option value="#000000" style="color: #000000;">black</option>
        <option value="#00e31a" style="color: #00e31a;">green</option>
        <option value="#ffff00" style="color: #cccc00;">yellow</option> 
      </select>
      <button id="downloadBtn">► send! (it is anonymous)</button>
    </div>

    <div id="gallery"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="paint.js"></script>
</body>
</html>
