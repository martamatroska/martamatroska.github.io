<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml' xml:lang='en' lang='en'>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>@vhssoise</title>
    <link rel="icon" href="assets/favicon.ico">
    <style>
        body {
            margin: 10px;
            position: relative;
            min-height: 100vh;
            font-family: 'Times New Roman', serif;
            overflow-x: hidden;
            color: black;
        }

        #lang-btn {
            font-family: "Times New Roman", Times, serif;
            font-size: 11pt;
            letter-spacing: 1px;
            background: none;
            border: 2px dotted;
            color: black;
            text-decoration: none;
            cursor: pointer;
            padding: 0;
        }

        .wavy {
            text-decoration: underline wavy;
        }

        #clock {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-family: 'Times New Roman', serif;
            font-size: 11pt;
            color: black;
            z-index: 2;
        }

        .text {
            max-width: 90%;
            margin: 0 auto;
            font-size: 11pt;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .mail-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20pt;
        }

        .vhs-img {
            width: 120px;
            height: auto;
        }

        .section-block {
            margin-top: 2em;
            margin-bottom: 2em;
        }

        .headline {
            font-size: 16pt;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 0.8em;
        }

        .intro-block {
            margin-bottom: 1em;
            line-height: 1.6;
        }

        hr.divider {
            border: none;
            border-top: 1px solid #ccc;
            margin: 2em 0;
        }

        /* TARIFAS */
        #formats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        @media (min-width: 768px) {
            #formats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .format-card {
            border: 1px solid #ccc;
            padding: 15px;
            line-height: 1.6;
        }

        .format-card:hover {
            background-color: #f0f0f0;
        }

        .format-card h4 {
            font-size: 13pt;
            margin-top: 0;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .format-dur {
            font-size: 10pt;
            color: #666;
            display: block;
            margin-bottom: 8px;
        }

        .format-prices {
            margin-top: 8px;
            border-top: 1px solid #eee;
            padding-top: 8px;
        }

        .format-price-row {
            display: flex;
            justify-content: space-between;
            font-size: 10.5pt;
            padding: 2px 0;
        }

        .format-price-label {
            color: #444;
        }

        .format-price-val {
            font-weight: bold;
        }

        .format-note {
            font-size: 9.5pt;
            color: #888;
            margin-top: 8px;
            line-height: 1.5;
        }

        
        #delivery-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        @media (min-width: 768px) {
            #delivery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .delivery-card {
            border: 1px solid #ccc;
            padding: 15px;
            line-height: 1.6;
        }

        .delivery-card:hover {
            background-color: #f0f0f0;
        }

        .delivery-card h4 {
            font-size: 13pt;
            margin-top: 0;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .delivery-time {
            font-size: 16pt;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .delivery-desc {
            font-size: 10pt;
            color: #555;
        }

        .delivery-footnote {
            font-size: 9.5pt;
            color: #888;
            margin-top: 12px;
            line-height: 1.6;
        }

        
        .extra-block {
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 16px;
            line-height: 1.6;
        }

        .extra-block:hover {
            background-color: #f0f0f0;
        }

        .extra-block h4 {
            font-size: 13pt;
            margin-top: 0;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .extra-price {
            font-weight: bold;
            font-size: 11pt;
            margin-top: 6px;
            display: block;
        }

        
        .note-box {
            border-left: 3px dotted #ccc;
            padding: 10px 14px;
            margin-top: 16px;
            font-size: 10pt;
            color: #555;
            line-height: 1.6;
        }

        
        @media (max-width: 600px) {
            .text {
                font-size: 22pt;
                padding: 10px;
            }
            .mail-container {
                font-size: 22pt;
            }
            .headline {
                font-size: 26pt;
            }
            .format-card h4, .delivery-card h4, .extra-block h4 {
                font-size: 24pt;
            }
            .format-price-row, .format-dur, .delivery-desc, .extra-price, .note-box {
                font-size: 18pt !important;
            }
            .delivery-time {
                font-size: 28pt;
            }
            .delivery-footnote, .format-note {
                font-size: 16pt !important;
            }
        }
    </style>

</head>

<body>
    <div id="content">
        <div class="container">
            <div class="text">
                <br>
                <button id="lang-btn">ENG</button>
                <br><br>

                <div class="section-block">
                    <div class="headline" id="headline"></div>
                    <div class="intro-block" id="intro1"></div>
                    <div class="intro-block" id="intro2"></div>
                </div>

                <hr class="divider">

                <div class="section-block">
                    <span id="about"></span>
                    <br><br>
                    <strong><span id="tagline"></span></strong>
                </div>

                <hr class="divider">

                <div class="section-block">
                    <span id="contact"></span>
                    <br><br>
                    <div class="mail-container">
                        <span class="mail">casfemarta@gmail.com</span>
                        <img src="assets/vhssoise.png" class="vhs-img">
                    </div>
                    <br>
                    <span id="delivery_label"></span>
                </div>

                <hr class="divider">

                <div class="section-block">
                    <h3 id="formats-title"></h3>
                    <div id="formats-grid">
                        <div class="format-card">
                            <h4 id="fmt-name-0"></h4>
                            <span class="format-dur" id="fmt-dur-0"></span>
                            <div class="format-prices">
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-0-0"></span><span class="format-price-val" id="fmt-pval-0-0"></span></div>
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-0-1"></span><span class="format-price-val" id="fmt-pval-0-1"></span></div>
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-0-2"></span><span class="format-price-val" id="fmt-pval-0-2"></span></div>
                            </div>
                            <span class="format-note" id="fmt-note-0"></span>
                        </div>
                        <div class="format-card">
                            <h4 id="fmt-name-1"></h4>
                            <span class="format-dur" id="fmt-dur-1"></span>
                            <div class="format-prices">
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-1-0"></span><span class="format-price-val" id="fmt-pval-1-0"></span></div>
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-1-1"></span><span class="format-price-val" id="fmt-pval-1-1"></span></div>
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-1-2"></span><span class="format-price-val" id="fmt-pval-1-2"></span></div>
                            </div>
                            <span class="format-note" id="fmt-note-1" style="display:none"></span>
                        </div>
                        <div class="format-card">
                            <h4 id="fmt-name-2"></h4>
                            <span class="format-dur" id="fmt-dur-2"></span>
                            <div class="format-prices">
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-2-0"></span><span class="format-price-val" id="fmt-pval-2-0"></span></div>
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-2-1"></span><span class="format-price-val" id="fmt-pval-2-1"></span></div>
                                <div class="format-price-row"><span class="format-price-label" id="fmt-plabel-2-2"></span><span class="format-price-val" id="fmt-pval-2-2"></span></div>
                            </div>
                            <span class="format-note" id="fmt-note-2" style="display:none"></span>
                        </div>
                    </div>
                </div>

                <div class="section-block">
                    <h3 id="delivery-title"></h3>
                    <div id="delivery-grid">
                        <div class="delivery-card">
                            <h4 id="del-plan-0"></h4>
                            <span class="delivery-time" id="del-time-0"></span>
                        </div>
                        <div class="delivery-card">
                            <h4 id="del-plan-1"></h4>
                            <span class="delivery-time" id="del-time-1"></span>
                        </div>
                        <div class="delivery-card">
                            <h4 id="del-plan-2"></h4>
                            <span class="delivery-time" id="del-time-2"></span>
                        </div>
                    </div>
                    <p class="delivery-footnote" id="delivery-footnote"></p>
                </div>

                <div class="section-block">
                    <h3 id="extra-title"></h3>
                    <div class="extra-block">
                        <h4 id="extra-name"></h4>
                        <span id="extra-desc"></span>
                        <span class="extra-price" id="extra-price"></span>
                    </div>
                    <div class="note-box">
                        <strong id="note-title"></strong> <span id="note-body"></span>
                    </div>
                </div>

                <br><br>

            </div>
        </div>
    </div>

    <div id="clock"></div>

    <img src="assets/VHS Tape.ico" class="floating-ico" style="position: fixed; width: 32px; height: 32px; top: 0; left: 0; z-index: 999;">
    <img src="assets/Sony_TRV_99.ico" class="floating-ico" style="position: fixed; width: 32px; height: 32px; top: 50px; left: 50px; z-index: 999;">
    <img src="assets/iMac DV Lime.ico" class="floating-ico" style="position: fixed; width: 32px; height: 32px; top: 100px; left: 100px; z-index: 999;">

    <script src="clock.js"></script>
    <script src="language.js"></script>
</body>
</html>
